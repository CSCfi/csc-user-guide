kind: BuildConfig
apiVersion: build.openshift.io/v1
metadata:
  name: {{ include "docs-csc.origBuilderName" . }}
  labels:
{{ include "docs-csc.labels" . | indent 4 }}
spec:
  triggers:
    - type: ImageChange
      imageChange:
        from:
          kind: ImageStreamTag
          name: {{ printf "%s:%s" (include "docs-csc.baseName" .) "latest" | squote }}
  output:
    to:
      kind: ImageStreamTag
      name: {{ printf "%s:%s" (include "docs-csc.origBuilderName" .) "latest" | squote }}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile.builder
      buildArgs:
        - name: base_image
          value: {{ include "docs-csc.latestBaseImage" . | squote }}
  source:
{{ include "docs-csc.gitSource" . | indent 4 -}}