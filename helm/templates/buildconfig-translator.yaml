kind: BuildConfig
apiVersion: build.openshift.io/v1
metadata:
  name: {{ include "docs-csc.translatorName" . }}
  labels:
{{ include "docs-csc.labels" . | indent 4 }}
spec:
  triggers:
    - type: ImageChange
      imageChange:
        from:
          kind: ImageStreamTag
          name: {{ printf "%s:%s" (include "docs-csc.baseName" .) "latest" | squote }}
  output:
    to:
      kind: ImageStreamTag
      name: {{ printf "%s:%s" (include "docs-csc.translatorName" .) "latest" | squote }}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: translation/Containerfile.translator
      buildArgs:
        - name: base_image
          value: {{ include "docs-csc.latestBaseImage" . | squote }}
        - name: restic_image
          value: {{ printf "%s:%s" .Values.translator.restic.image
                                   .Values.translator.restic.tag | squote -}}
{{ include "docs-csc.repoOverride" (.Values.translator.repo | default dict) | indent 8 }}
  source:
{{ include "docs-csc.gitSource" . | indent 4 -}}